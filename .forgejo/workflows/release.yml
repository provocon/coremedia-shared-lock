# Environment variables needed:
# PUBLICATION_KEY_FILE
# PUBLICATION_KEY
# PUBLICATION_PASSWORD
# CENTRAL_USER
# CENTRAL_TOKEN
#
name: Build Library

on:
  push:
    tags: [ '*' ]

jobs:
  build:

    runs-on: provocon
    container:
      image: debian:stable-slim

    steps:
    - name: Prepare Tools
      run: apt update ; apt install -yq gnupg nodejs

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: https://github.com/actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cat <(echo -e "${{ secrets.PUBLICATION_KEY_FILE }}") | gpg --dearmor > key.gpg
        ./gradlew -Psigning.keyId=${{secrets.PUBLICATION_KEY}} -Psigning.password=${{secrets.PUBLICATION_PASSWORD}} -Psigning.secretKeyRingFile=key.gpg \
                  -PcoremediaUsername=${{secrets.COREMEDIA_REPOSITORY_USER}} -PcoremediaPassword=${{secrets.COREMEDIA_REPOSITORY_PASSWORD}} \
                  -Ptag -PmavenCentralUsername=${{secrets.CENTRAL_USER}} -PmavenCentralPassword=${{secrets.CENTRAL_TOKEN}} \
                  build sign publishToMavenCentral
