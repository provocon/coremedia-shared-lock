#
# Environment variables needed:
# SIGNING_KEY_FILE
# SIGNING_KEY
# SIGNING_PASSWORD
# PUBLICATION_USER
# PUBLICATION_TOKEN
#
name: Build Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cat <(echo -e "${{ secrets.SIGNING_KEY_FILE }}") | gpg --dearmor > key.gpg
        ./gradlew -Psigning.keyId=${{secrets.SIGNING_KEY}} -Psigning.password=${{secrets.SIGNING_PASSWORD}} -Psigning.secretKeyRingFile=key.gpg \
                  -PcoremediaUsername=${{secrets.COREMEDIA_REPOSITORY_USER}} -PcoremediaPassword=${{secrets.COREMEDIA_REPOSITORY_PASSWORD}} \
                  -Pgh.user=${{vars.PUBLICATION_USER}} -Pgh.token=${{secrets.PUBLICATION_TOKEN}} \
                  build sign publishAllPublicationsToGitHubRepository
